services:
  - type: web
    name: dodgeai-backend
    runtime: docker
    rootDir: backend
    plan: free
    autoDeploy: true
    healthCheckPath: /health
    envVars:
      - key: PORT
        value: 8000
      - key: APP_HOST
        value: 0.0.0.0
      - key: APP_PORT
        value: 8000
      - key: CORS_ORIGINS
        value: https://dodgeaiassgn.vercel.app
      - key: MAX_UPLOAD_MB
        value: 100
      - key: UPLOAD_DIR
        value: /tmp/uploads
      - key: OVERLAP_THRESHOLD
        value: 0.30
      - key: CONFIDENCE_THRESHOLD
        value: 0.60
      - key: BORDERLINE_LOW
        value: 0.40
      - key: BORDERLINE_HIGH
        value: 0.60
      - key: MIN_NAME_SIMILARITY
        value: 0.65
      - key: MIN_INTERSECTION_SIZE
        value: 5
      - key: MIN_DISTINCT_VALUES
        value: 8
      - key: MAX_RELATIONSHIPS_PER_TABLE_PAIR
        value: 8
      - key: MYSQL_DATA_DIR
        value: /tmp/mysql
      - key: RATE_LIMIT_UPLOADS_PER_MINUTE
        value: 10
      - key: MYSQL_HOST
        value: 127.0.0.1
      - key: MYSQL_PORT
        value: 3306
      - key: MYSQL_DATABASE
        value: dodgeai
      - key: MYSQL_USER
        value: dodgeai
      - key: MYSQL_PASSWORD
        sync: false
      - key: NEO4J_URI
        sync: false
      - key: NEO4J_USER
        sync: false
      - key: NEO4J_PASSWORD
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: GROQ_MODEL
        value: llama-3.3-70b-versatile
